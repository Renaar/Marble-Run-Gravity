name: Publication GitHub Pages

# Publie le site sur la branche gh-pages à chaque mise à jour de main.
# (La création du site Pages via l'API n'est pas permise au jeton du
# workflow ; la branche gh-pages, elle, est activée automatiquement.)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Publier sur la branche gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
